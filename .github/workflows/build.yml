name: Build Desktop Apps

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

permissions:
  contents: read

jobs:
  test-electron:
    name: Test Electron
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run electron:typecheck

      - name: Run tests
        run: npm run electron:test

  build-windows:
    name: Build Windows Installer
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Cache Electron builder downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Stamp Electron build info
        run: node scripts/stamp_electron_build_info.mjs "build-${{ github.run_number }}"

      - name: Build Windows installer
        shell: pwsh
        run: npm run electron:build -- --win nsis --publish never

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: OrderQuickReadSetup.exe
          path: dist-electron-packages/OrderQuickReadSetup.exe
          if-no-files-found: error
          compression-level: 0

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - test-electron
      - build-windows
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Download Windows installer
        uses: actions/download-artifact@v8
        with:
          name: OrderQuickReadSetup.exe
          path: release-assets

      - name: Generate installer checksum
        shell: bash
        run: |
          sha256sum release-assets/OrderQuickReadSetup.exe \
            | awk '{print $1 "  OrderQuickReadSetup.exe"}' \
            > release-assets/OrderQuickReadSetup.exe.sha256

      - name: Publish direct downloads
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="build-${GITHUB_RUN_NUMBER}"
          gh release create "$tag" \
            "release-assets/OrderQuickReadSetup.exe#OrderQuickReadSetup.exe" \
            "release-assets/OrderQuickReadSetup.exe.sha256#OrderQuickReadSetup.exe.sha256" \
            --title "Order Quick Read ${tag}" \
            --notes "Windows: download OrderQuickReadSetup.exe and double-click to install." \
            --target "$GITHUB_SHA" \
            --latest

  publish-download-server:
    name: Publish AUSMET Download
    runs-on: ubuntu-latest
    needs:
      - test-electron
      - build-windows
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Download Windows installer
        uses: actions/download-artifact@v8
        with:
          name: OrderQuickReadSetup.exe
          path: release-assets

      - name: Configure download server SSH
        shell: bash
        env:
          DOWNLOAD_SSH_PRIVATE_KEY: ${{ secrets.DOWNLOAD_SSH_PRIVATE_KEY }}
          DOWNLOAD_SSH_KNOWN_HOSTS: ${{ secrets.DOWNLOAD_SSH_KNOWN_HOSTS }}
        run: |
          test -n "$DOWNLOAD_SSH_PRIVATE_KEY"
          test -n "$DOWNLOAD_SSH_KNOWN_HOSTS"
          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$DOWNLOAD_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$DOWNLOAD_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Publish direct AUSMET download
        shell: bash
        env:
          DOWNLOAD_SSH_HOST: download.ausmet.ai
          DOWNLOAD_SSH_USER: orderflow-deploy
          DOWNLOAD_TAG: build-${{ github.run_number }}
          DOWNLOAD_BASE_URL: https://download.ausmet.ai/orderead
          DOWNLOAD_REMOTE_ROOT: /srv/orderflow-download/public/orderead
        run: bash ./scripts/publish-download-server.sh release-assets/OrderQuickReadSetup.exe
