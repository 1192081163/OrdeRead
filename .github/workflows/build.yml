name: Build Desktop Apps

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

permissions:
  contents: write

jobs:
  test-electron:
    name: Test Electron
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run electron:typecheck

      - name: Run tests
        run: npm run electron:test

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Electron builder downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Stamp Electron build info
        run: node scripts/stamp_electron_build_info.mjs "build-${{ github.run_number }}"

      - name: Build Windows installer
        shell: pwsh
        run: npm run electron:build -- --win nsis --publish never

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: OrderQuickReadSetup.exe
          path: dist-electron-packages/OrderQuickReadSetup.exe
          if-no-files-found: error

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - test-electron
      - build-windows
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Download Windows installer
        uses: actions/download-artifact@v8
        with:
          name: OrderQuickReadSetup.exe
          path: release-assets

      - name: Generate installer checksum
        shell: bash
        run: |
          sha256sum release-assets/OrderQuickReadSetup.exe \
            | awk '{print $1 "  OrderQuickReadSetup.exe"}' \
            > release-assets/OrderQuickReadSetup.exe.sha256

      - name: Publish direct downloads
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="build-${GITHUB_RUN_NUMBER}"
          gh release create "$tag" \
            "release-assets/OrderQuickReadSetup.exe#OrderQuickReadSetup.exe" \
            "release-assets/OrderQuickReadSetup.exe.sha256#OrderQuickReadSetup.exe.sha256" \
            --title "Order Quick Read ${tag}" \
            --notes "Windows: download OrderQuickReadSetup.exe and double-click to install." \
            --target "$GITHUB_SHA" \
            --latest

  publish-gitee-release:
    name: Mirror Source and Publish Gitee Release
    runs-on: ubuntu-latest
    needs:
      - publish-release
    if: github.ref == 'refs/heads/main'
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      GITEE_USERNAME: wei-dongyu_1_0
      GITEE_REPOSITORY: wei-dongyu_1_0/OrdeRead
      GIT_TERMINAL_PROMPT: 0
    steps:
      - name: Check out full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require Gitee release credentials
        shell: bash
        run: test -n "$GITEE_TOKEN"

      - name: Mirror source and tags to Gitee
        shell: bash
        run: |
          git fetch origin --force --tags
          git remote add gitee "https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPOSITORY}.git"
          pushed=false
          for attempt in 1 2 3; do
            if timeout 180s git -c http.version=HTTP/1.1 push gitee HEAD:main --tags --force; then
              pushed=true
              break
            fi
            echo "Gitee mirror attempt ${attempt} failed; retrying..." >&2
          done
          git remote remove gitee
          test "$pushed" = true

      - name: Download Windows installer
        uses: actions/download-artifact@v8
        with:
          name: OrderQuickReadSetup.exe
          path: release-assets

      - name: Publish verified Gitee Windows release
        shell: bash
        env:
          GITEE_TAG: build-${{ github.run_number }}
          GITEE_TARGET: ${{ github.sha }}
        run: |
          mkdir -p release-assets/gitee
          split --bytes=8M --numeric-suffixes=0 --suffix-length=2 \
            release-assets/OrderQuickReadSetup.exe \
            release-assets/gitee/OrderQuickReadSetup.exe.part-
          sha256sum release-assets/OrderQuickReadSetup.exe \
            | awk '{print $1 "  OrderQuickReadSetup.exe"}' \
            > release-assets/gitee/OrderQuickReadSetup.exe.sha256
          bash ./scripts/publish-gitee-release.sh release-assets/gitee/*
