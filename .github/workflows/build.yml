name: Build Desktop Apps

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        shell: pwsh
        run: .\scripts\build_windows.ps1

      - name: Upload Windows package
        uses: actions/upload-artifact@v7
        with:
          name: email-order-reader-windows
          path: dist/Email Order Reader

      - name: Upload direct Windows executable
        uses: actions/upload-artifact@v7
        with:
          name: EmailOrderReader.exe
          path: dist/EmailOrderReader.exe

      - name: Publish direct Windows download
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "build-$env:GITHUB_RUN_NUMBER"
          gh release create $tag "dist/EmailOrderReader.exe#EmailOrderReader.exe" `
            --title "Email Order Reader $tag" `
            --notes "Download EmailOrderReader.exe and double-click to run." `
            --latest

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

      - name: Build package
        shell: bash
        run: bash scripts/build_macos.sh

      - name: Upload macOS package
        uses: actions/upload-artifact@v7
        with:
          name: email-order-reader-macos
          path: dist/Email Order Reader.app
